<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafa Abdullah — Cybersecurity · Investment · Entrepreneur</title>
<meta name="description" content="Rafa Abdullah Mushowwir — Cybersecurity learner, investor, and F&B entrepreneur from Jakarta, Indonesia.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf9;--bg2:#f4f3f0;--bg3:#eeecea;
  --surface:#ffffff;--surface2:#f9f8f5;
  --border:rgba(180,140,60,0.12);--border2:rgba(180,140,60,0.28);
  --text:#1a1710;--muted:#7a7060;--dim:#b0a898;
  --accent:#b8820a;--accent-h:#d4990f;
  --gold:#c8961e;--caramel:#8b6010;--cream:#f5f0e8;
  --fd:"Syne",sans-serif;--fm:"Space Mono",monospace;--fb:"DM Sans",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-weight:300;line-height:1.6;overflow-x:hidden;cursor:none;}

/* CURSOR */
.cur-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;}
.cur-ring{width:28px;height:28px;border:1px solid rgba(184,130,10,0.5);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transition:all 0.14s ease;}
.cur-ring.hov{transform:scale(2.2);border-color:var(--accent);background:rgba(184,130,10,0.04);}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);z-index:8888;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.8s ease,visibility 0.8s ease;}
#loader.out{opacity:0;visibility:hidden;}
.ld-icon{font-size:24px;animation:steam 2s ease infinite;}
@keyframes steam{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.ld-name{font-family:var(--fd);font-size:clamp(22px,4vw,40px);font-weight:800;letter-spacing:-2px;color:var(--text);}
.ld-name em{color:var(--accent);font-style:normal;}
.ld-sub{font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.ld-bar{width:130px;height:1px;background:var(--border);position:relative;overflow:hidden;margin-top:6px;}
.ld-bar::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),transparent);animation:ldBar 1.6s ease forwards;}
@keyframes ldBar{to{left:100%;}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 48px;display:flex;align-items:center;justify-content:space-between;transition:all 0.4s ease;}
nav.sc{background:rgba(250,250,249,0.96);border-bottom:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:13px 48px;}
.n-logo{font-family:var(--fm);font-size:12px;color:var(--text);text-decoration:none;}
.n-logo em{color:var(--accent);font-style:normal;}
.n-links{display:flex;gap:28px;list-style:none;}
.n-links a{font-family:var(--fm);font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s;}
.n-links a:hover{color:var(--accent);}
.n-right{display:flex;align-items:center;gap:14px;}
.n-status{display:flex;align-items:center;gap:7px;font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.n-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pa 2.5s infinite;}
@keyframes pa{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(184,130,10,0.5);}50%{opacity:0.6;box-shadow:0 0 0 5px rgba(184,130,10,0);}}
.n-cmd{font-family:var(--fm);font-size:9px;color:var(--dim);border:1px solid var(--border);padding:6px 12px;cursor:pointer;transition:all 0.2s;background:none;letter-spacing:1px;}
.n-cmd:hover{border-color:var(--border2);color:var(--accent);}
.ham{display:none;flex-direction:column;gap:4px;cursor:pointer;background:none;border:none;}
.ham span{width:22px;height:1px;background:var(--text);display:block;transition:all 0.3s;}

/* HERO */
#hero{min-height:100vh;display:flex;align-items:center;padding:100px 48px 60px;position:relative;overflow:hidden;background:var(--bg);}
.hero-ambient{position:absolute;inset:0;background:radial-gradient(ellipse 50% 60% at 25% 55%,rgba(184,130,10,0.06) 0%,transparent 65%),radial-gradient(ellipse 35% 45% at 75% 30%,rgba(200,150,30,0.04) 0%,transparent 65%);}
.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(184,130,10,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(184,130,10,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 80% at 30% 50%,black 10%,transparent 80%);}
.hero-inner{max-width:1140px;margin:0 auto;width:100%;display:flex;align-items:center;gap:60px;position:relative;z-index:2;}
.hero-photo-col{flex-shrink:0;position:relative;opacity:0;animation:fU 0.8s ease 1.9s forwards;}
.hero-photo-card{width:210px;height:270px;background:var(--surface);border:1px solid var(--border2);overflow:hidden;position:relative;box-shadow:0 2px 0 0 var(--accent),0 20px 48px rgba(184,130,10,0.08),0 4px 16px rgba(0,0,0,0.06);}
.hero-photo-card img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;filter:sepia(8%) contrast(1.04) brightness(1.0) saturate(0.92);transition:filter 0.4s ease;}
.hero-photo-card:hover img{filter:sepia(2%) contrast(1.02) brightness(1.02);}
.hero-photo-card::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.015) 3px,rgba(0,0,0,0.015) 4px);pointer-events:none;z-index:1;}
.hero-corner{position:absolute;width:14px;height:14px;z-index:2;}
.hc-tl{top:-1px;left:-1px;border-top:1.5px solid var(--accent);border-left:1.5px solid var(--accent);}
.hc-br{bottom:-1px;right:-1px;border-bottom:1.5px solid var(--accent);border-right:1.5px solid var(--accent);}
.hero-text-col{flex:1;opacity:0;animation:fU 0.8s ease 2.05s forwards;}
.avail-badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;opacity:0;animation:fU 0.7s ease 2s forwards;}
.avail-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pa 2.5s infinite;flex-shrink:0;}
.hero-h1{font-family:var(--fd);font-size:clamp(42px,5.8vw,84px);font-weight:800;line-height:0.94;letter-spacing:-3px;margin-bottom:22px;color:var(--text);}
.hero-h1 .dim-line{color:var(--dim);}
.hero-lead{font-size:15px;color:var(--text);font-weight:400;line-height:1.65;margin-bottom:8px;max-width:480px;}
.hero-lead strong{color:var(--accent);}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.72;margin-bottom:32px;max-width:460px;}
.hero-stats{display:flex;gap:36px;margin-bottom:32px;padding-top:24px;border-top:1px solid var(--border);}
.hstat-num{font-family:var(--fd);font-size:30px;font-weight:800;color:var(--text);line-height:1;margin-bottom:4px;}
.hstat-num sup{color:var(--accent);font-size:16px;}
.hstat-label{font-family:var(--fm);font-size:8px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;}
.hero-ctas{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;}
.btn-p{font-family:var(--fm);font-size:10px;background:var(--accent);color:#fff;padding:13px 26px;text-decoration:none;letter-spacing:2px;text-transform:uppercase;font-weight:700;transition:all 0.2s;display:inline-block;}
.btn-p:hover{background:var(--accent-h);transform:translateY(-1px);}
.btn-g{font-family:var(--fm);font-size:10px;color:var(--muted);padding:13px 26px;text-decoration:none;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--border2);transition:all 0.2s;background:none;cursor:none;}
.btn-g:hover{border-color:var(--accent);color:var(--accent);}
.hero-socials{display:flex;gap:18px;}
.h-soc{font-family:var(--fm);font-size:9px;color:var(--dim);text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s;display:flex;align-items:center;gap:5px;}
.h-soc::before{content:"↗";font-size:8px;}
.h-soc:hover{color:var(--accent);}
@keyframes fU{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* MARQUEE */
.mqw{background:var(--cream);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 0;overflow:hidden;position:relative;z-index:2;}
.mqt{display:flex;animation:mq 32s linear infinite;width:max-content;}
.mqi{font-family:var(--fm);font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;padding:0 26px;white-space:nowrap;display:flex;align-items:center;gap:14px;}
.mqi::after{content:"&#9670;";color:var(--accent);font-size:5px;opacity:0.5;}
@keyframes mq{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* SECTION */
.si{max-width:1140px;margin:0 auto;padding:88px 48px;}
.sl{font-family:var(--fm);font-size:9px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:10px;}
.sl::after{content:"";flex:1;height:1px;background:var(--border);max-width:40px;}
.st{font-family:var(--fd);font-size:clamp(26px,3.6vw,46px);font-weight:700;letter-spacing:-1.5px;line-height:1.04;margin-bottom:52px;color:var(--text);}

/* ABOUT */
#about{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.about-grid{display:grid;grid-template-columns:1fr 360px;gap:64px;align-items:start;}
.about-text p{font-size:15px;color:var(--muted);line-height:1.82;margin-bottom:18px;}
.about-text p strong{color:var(--text);font-weight:500;}
.about-photo-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;margin-bottom:12px;position:relative;transition:border-color 0.3s;box-shadow:0 4px 20px rgba(0,0,0,0.06);}
.about-photo-card:hover{border-color:var(--border2);}
.about-photo-card img{width:100%;height:240px;object-fit:cover;object-position:center 15%;display:block;filter:sepia(10%) brightness(0.97) contrast(1.02) saturate(0.9);transition:all 0.4s;}
.about-photo-card:hover img{filter:sepia(3%) brightness(1.01);transform:scale(1.02);}
.about-photo-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(250,250,249,0.5) 0%,transparent 50%);}
.about-photo-lbl{position:absolute;bottom:11px;left:11px;font-family:var(--fm);font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.about-cards{display:flex;flex-direction:column;gap:7px;}
.ac{background:var(--surface);border:1px solid var(--border);padding:16px 18px;transition:all 0.25s;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.ac::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);opacity:0;transition:opacity 0.25s;}
.ac:hover{border-color:var(--border2);box-shadow:0 4px 12px rgba(184,130,10,0.08);}
.ac:hover::before{opacity:1;}
.ac-icon{font-size:14px;margin-bottom:5px;}
.ac h4{font-family:var(--fd);font-size:12px;font-weight:600;margin-bottom:3px;color:var(--text);}
.ac p{font-size:11px;color:var(--muted);line-height:1.6;}

/* SKILLS */
#skills{background:var(--bg);border-top:1px solid var(--border);}
.bento{display:grid;grid-template-columns:repeat(12,1fr);gap:8px;}
.bc{background:var(--surface);border:1px solid var(--border);padding:22px;transition:all 0.25s;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.bc:hover{border-color:var(--border2);box-shadow:0 6px 20px rgba(184,130,10,0.07);transform:translateY(-2px);}
.bc::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(184,130,10,0.04),transparent 52%);opacity:0;transition:opacity 0.3s;pointer-events:none;}
.bc:hover::after{opacity:1;}
.b1{grid-column:span 7;}.b2{grid-column:span 5;}
.b3{grid-column:span 4;}.b4{grid-column:span 4;}.b5{grid-column:span 4;}
.b6{grid-column:span 6;}.b7{grid-column:span 6;}
.bi{font-size:17px;margin-bottom:10px;}
.bt{font-family:var(--fd);font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text);}
.bd{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:11px;}
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-family:var(--fm);font-size:8px;color:var(--dim);border:1px solid var(--border);padding:3px 8px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;background:var(--bg2);}
.tag:hover{border-color:var(--border2);color:var(--accent);background:var(--cream);}
.sbar-wrap{margin-top:11px;}
.sbar{margin-bottom:9px;}
.sbar-h{display:flex;justify-content:space-between;margin-bottom:4px;}
.sbar-n{font-family:var(--fm);font-size:8px;color:var(--muted);letter-spacing:1px;}
.sbar-p{font-family:var(--fm);font-size:8px;color:var(--accent);}
.sbar-t{height:1px;background:var(--border);}
.sbar-f{height:100%;background:linear-gradient(90deg,var(--caramel),var(--accent),var(--gold));width:0;transition:width 1.4s cubic-bezier(0.4,0,0.2,1);}
.lpill{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:8px;color:var(--accent);border:1px solid rgba(184,130,10,0.25);background:var(--cream);padding:3px 9px;letter-spacing:1px;margin-bottom:10px;}
.lpdot{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:pa 2s infinite;}

/* JOURNEY */
#experience{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.tl-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;}
.tl{position:relative;padding-left:24px;}
.tl::before{content:"";position:absolute;left:0;top:6px;bottom:0;width:1px;background:var(--border);}
.tl-label{font-family:var(--fm);font-size:9px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:26px;}
.tl-item{position:relative;margin-bottom:32px;opacity:0;transform:translateX(-8px);transition:all 0.5s ease;}
.tl-item.vis{opacity:1;transform:translateX(0);}
.tl-dot{position:absolute;left:-29px;top:3px;width:7px;height:7px;border:1.5px solid var(--accent);background:var(--bg);border-radius:50%;}
.tl-dot.act{background:var(--accent);box-shadow:0 0 0 3px rgba(184,130,10,0.15);}
.tl-year{font-family:var(--fm);font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:5px;}
.tl-title{font-family:var(--fd);font-size:15px;font-weight:600;margin-bottom:2px;color:var(--text);}
.tl-org{font-family:var(--fm);font-size:9px;color:var(--muted);margin-bottom:7px;}
.tl-desc{font-size:12px;color:var(--muted);line-height:1.7;max-width:420px;}
.tl-badge{display:inline-block;margin-bottom:6px;font-family:var(--fm);font-size:8px;letter-spacing:1px;padding:2px 8px;border:1px solid var(--border2);color:var(--accent);background:var(--cream);}

/* PROJECTS */
#projects{background:var(--bg);}
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pc{background:var(--surface);border:1px solid var(--border);padding:22px;transition:all 0.25s;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.pc:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 8px 24px rgba(184,130,10,0.07);}
.pc::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),transparent);opacity:0;transition:opacity 0.3s;}
.pc:hover::before{opacity:1;}
.pc-featured{grid-column:span 2;}
.pc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.pc-type{font-family:var(--fm);font-size:8px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(184,130,10,0.2);padding:3px 8px;background:var(--cream);}
.pc-links{display:flex;gap:10px;}
.pc-link{font-size:11px;color:var(--dim);text-decoration:none;transition:color 0.2s;font-family:var(--fm);}
.pc-link:hover{color:var(--accent);}
.pc-status{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:8px;color:var(--muted);margin-bottom:10px;}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:pa 2s infinite;}
.pc-title{font-family:var(--fd);font-size:15px;font-weight:600;margin-bottom:7px;line-height:1.3;color:var(--text);}
.pc-desc{font-size:12px;color:var(--muted);line-height:1.7;flex:1;margin-bottom:14px;}
.pc-tech{display:flex;flex-wrap:wrap;gap:5px;}
.pc-tech span{font-family:var(--fm);font-size:8px;color:var(--muted);background:var(--bg2);border:1px solid var(--border);padding:2px 7px;letter-spacing:1px;}

/* INSIGHTS */
#insights{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.ins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.ic{background:var(--surface);border:1px solid var(--border);padding:20px;transition:all 0.25s;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.03);}
.ic:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 18px rgba(184,130,10,0.06);}
.ic-cat{font-family:var(--fm);font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;margin-bottom:11px;display:inline-block;}
.cs{color:var(--accent);border:1px solid rgba(184,130,10,0.2);background:var(--cream);}
.cf{color:#a06020;border:1px solid rgba(160,96,32,0.2);background:#fdf5e8;}
.ct{color:#4080a0;border:1px solid rgba(64,128,160,0.2);background:#f0f5f9;}
.ce{color:#806020;border:1px solid rgba(128,96,32,0.2);background:#fdf8ee;}
.ic-title{font-family:var(--fd);font-size:13px;font-weight:600;line-height:1.35;margin-bottom:8px;color:var(--text);}
.ic-excerpt{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:13px;}
.ic-meta{display:flex;justify-content:space-between;align-items:center;}
.ic-date{font-family:var(--fm);font-size:9px;color:var(--dim);}
.ic-read{font-family:var(--fm);font-size:9px;color:var(--accent);text-decoration:none;letter-spacing:1px;display:flex;align-items:center;gap:5px;transition:gap 0.2s;}
.ic-read:hover{gap:9px;}

/* CONTACT */
#contact{background:var(--bg);border-top:1px solid var(--border);}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}
.contact-big{font-family:var(--fd);font-size:clamp(28px,3.8vw,52px);font-weight:800;letter-spacing:-2px;line-height:1.04;margin-bottom:16px;color:var(--text);}
.contact-big .hl{color:var(--accent);}
.contact-note{font-size:14px;color:var(--muted);line-height:1.78;margin-bottom:22px;max-width:360px;}
.contact-email{font-family:var(--fm);font-size:12px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border);transition:color 0.2s;}
.contact-email:hover{color:var(--accent);}
.contact-email::before{content:"→";color:var(--accent);}
.contact-photo{display:flex;align-items:center;gap:13px;margin-bottom:18px;}
.cp-wrap{position:relative;width:58px;height:58px;flex-shrink:0;}
.cp-img{width:58px;height:58px;border-radius:50%;object-fit:cover;object-position:center top;filter:sepia(10%) brightness(0.95);transition:filter 0.3s;border:2px solid var(--border2);}
.cp-wrap:hover .cp-img{filter:sepia(2%) brightness(1.0);}
.cp-ring{position:absolute;inset:-4px;border:1px solid var(--accent);border-radius:50%;opacity:0.35;animation:spin 7s linear infinite;}
.cp-ring2{position:absolute;inset:-8px;border:1px solid rgba(184,130,10,0.1);border-radius:50%;animation:spin 12s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.cp-info{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:1px;}
.cp-info strong{display:block;font-family:var(--fd);font-size:13px;color:var(--text);font-weight:600;letter-spacing:0;margin-bottom:2px;}
.socials{display:flex;flex-direction:column;gap:7px;}
.soc{display:flex;align-items:center;justify-content
